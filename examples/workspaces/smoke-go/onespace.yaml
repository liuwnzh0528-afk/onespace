version: 1
name: smoke-go
allowedRepoRoots:
  - repos
services:
  user-api:
    language: go
    repoPath: repos/user-api
    main: ./cmd/user-api
    ports:
      - name: http
        container: 8080
        host: 18081
    health:
      type: http
      url: http://127.0.0.1:18081/health
      timeoutSeconds: 30
    debug:
      port: 40001
