version: 1
name: smoke-go
allowedRepoRoots:
  - repos
services:
  user-api:
    language: go
    repoPath: repos/user-api
    main: ./cmd/user-api
    env:
      APP_ENV: local
    envFrom:
      - file: .env
      - file: .env.local
        optional: true
    files:
      - source: config/local.yaml
        target: /etc/user-api/config.yaml
        mode: "0444"
    secrets:
      - name: DB_PASSWORD
        fromFile: .secrets/db_password.example
    volumes:
      - source: onespace-smoke-user-api-cache
        target: /workspace/.cache
    dependsOn:
      - redis
    ports:
      - name: http
        container: 8080
        host: 18081
    health:
      type: http
      url: http://127.0.0.1:18081/health
      timeoutSeconds: 30
    debug:
      port: 40001

addons:
  redis:
    image: redis:7-alpine
