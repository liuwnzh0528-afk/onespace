version: 1
name: mock-ipmi

server:
  bind: 127.0.0.1:18180

runtime:
  type: docker-compose
  projectName: mock-ipmi
  network: mock-ipmi-default

services:
  bmc-a:
    kind: container
    image: metal-forge/mock-ipmi:dev
    env:
      MOCK_IPMI_NAME: bmc-a
      MOCK_IPMI_INITIAL_POWER: "off"
      MOCK_IPMI_INITIAL_BOOTDEV: disk
    ports:
      - name: ipmi
        container: 623
        host: 6230
        protocol: udp
